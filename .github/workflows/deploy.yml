name: Build and Deploy to DevOps Classroom

on:
  push:
    branches:
      - main # Thay bằng 'master' nếu nhánh chính của bạn tên là master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      # 1. Lấy code mới nhất từ GitHub
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      # 2. Đăng nhập vào Docker Hub (Cần thiết để có quyền đẩy Image lên)
      - name: Đăng nhập Docker Hub
        uses: docker/login-action@v4.0.0
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 3. Build code thành Docker Image và Push lên Docker Hub
      - name: Build and push Docker image
        uses: docker/build-push-action@v7.0.0
        with:
          context: .
          push: true
          tags: truongconghoan/demo:latest

      # 4. BƯỚC CỦA BẠN: Báo cho server kéo Image mới về chạy
      - name: Triển khai lên DevOps Classroom
        run: |
          REPO="truongconghoan/demo"
          CONTAINER_PORT=80
          RESPONSE=$(curl -sS -w "\n%{http_code}" -X POST "${{ secrets.DEPLOY_URL }}?repo=$REPO&tag=latest&slot=7&container_port=$CONTAINER_PORT&strict_container_port=0")
          BODY=$(echo "$RESPONSE" | sed "$d")
          CODE=$(echo "$RESPONSE" | tail -n1)
          echo "Webhook HTTP: $CODE"
          if [ "$CODE" -lt 200 ] || [ "$CODE" -ge 300 ]; then
            echo "Deploy thất bại. Xem chi tiết trong nhóm log bên dưới."
            echo "::group::Chi tiết webhook JSON"
            echo "$BODY" | python3 -m json.tool 2>/dev/null || echo "$BODY"
            echo "::endgroup::"
            exit 1
          fi
          echo "Deploy thành công."
          echo "::group::Chi tiết webhook JSON"
          echo "$BODY" | python3 -m json.tool 2>/dev/null || echo "$BODY"
          echo "::endgroup::"
